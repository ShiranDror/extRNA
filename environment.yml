# Conda environment for the full pipeline (Linux / macOS / WSL).
# Create with:  conda env create -f environment.yml
# Activate with: conda activate gdna_rescue
name: gdna_rescue
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.9
  - numpy>=1.23
  - pandas>=1.5
  - scipy>=1.9
  - polars>=1.0
  - pysam>=0.21
  - pytest>=7.0
  # Optional helpers referenced in the README (not required by the tool):
  - samtools
